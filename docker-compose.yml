services:
  agent:
    build: ./agent-service
    ports:
      - "8081:8081"
      - "8082:8082"
    volumes:
      - ~/workspace/pi-agent-burt:/workspace
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBSOCKET_PORT=8081
      - HTTP_PORT=8082
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  telegram:
    build: ./telegram-service
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - AGENT_API_URL=http://agent:8082
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}

  caddy:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - telegram

  frontend:
    build: ./frontend-service
    ports:
      - "8889:80"
